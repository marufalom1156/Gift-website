<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Need Some Gift</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
}

h1 {
    color: gold;
    margin-top: 20px;
}

.subtitle {
    color: #ccc;
    margin-bottom: 20px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #111;
    border: 2px solid gold;
    border-radius: 15px;
    padding: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px gold;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: gold;
    font-weight: bold;
    margin: 10px 0;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: orange;
}

.footer {
    margin-top: 20px;
    padding: 10px;
    border-top: 1px solid gold;
}
</style>

</head>

<body>

        <a href="https://wa.me/8801838613200">

    </div>

    <div class="card">
        <img src="image3.jpg">

        <p class="price">৳200</p>
        <a href="https://wa.me/8801838613200">

</div>
