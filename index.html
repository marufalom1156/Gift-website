<title>Maruf Gypsum Art</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #000000, #1a1a1a);
  margin: 0;
  padding: 0;
  text-align: center;
  color: gold;
}

/* Header */
header {
  background: black;
  padding: 20px;
  border-bottom: 2px solid gold;
}

.logo {
  font-size: 30px;
  font-weight: bold;
  color: gold;
}

.subtitle {
  color: #ccc;
  font-size: 14px;
}

/* Buttons */
.top-buttons {
  margin: 15px;
}

.btn {
  padding: 10px 15px;
  border-radius: 20px;
  border: 1px solid gold;
  background: transparent;
  color: gold;
  cursor: pointer;
  margin: 5px;
  transition: 0.3s;
}

.btn:hover {
  background: gold;
  color: black;
}

/* Container */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  padding: 20px;
}

/* Card */
.card {
  background: #111;
  padding: 15px;
  width: 250px;
  border-radius: 15px;
  border: 1px solid gold;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 15px gold;
}

img {
  width: 100%;
  border-radius: 10px;
}

/* Text */
.price {
  color: gold;
  font-size: 18px;
  margin: 5px 0;
}

/* Order Button */
.order-btn {
  background: gold;
  color: black;
  padding: 10px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.order-btn:hover {

}

</style>
